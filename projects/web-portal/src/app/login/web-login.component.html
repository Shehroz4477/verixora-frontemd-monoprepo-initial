<main class="login-shell">
  <section class="login-card" aria-labelledby="portal-title">
    <p class="eyebrow">VERIXORA CONTROL PORTAL</p>
    <h1 id="portal-title">Secure monitoring</h1>
    <p class="intro">Use the email verified from your trusted mobile device. Door unlock requests stay mobile-only.</p>

    <form (ngSubmit)="otpRequested ? login() : requestOtp()" #form="ngForm" novalidate>
      <label for="email">Verified email</label>
      <input id="email" name="email" type="email" autocomplete="email" [(ngModel)]="email" required [disabled]="loading || otpRequested">

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" [(ngModel)]="password" required [disabled]="loading || otpRequested">

      <ng-container *ngIf="otpRequested">
        <label for="otp">Email OTP</label>
        <input id="otp" name="otp" inputmode="numeric" autocomplete="one-time-code" maxlength="6" [(ngModel)]="otp" required [disabled]="loading">
      </ng-container>

      <p *ngIf="error" class="error" role="alert">{{ error }}</p>
      <button type="submit" [disabled]="loading || !form.valid || (otpRequested && otp.length !== 6)">
        {{ loading ? 'Please wait…' : (otpRequested ? 'Sign in securely' : 'Send email OTP') }}
      </button>
    </form>
  </section>
</main>
