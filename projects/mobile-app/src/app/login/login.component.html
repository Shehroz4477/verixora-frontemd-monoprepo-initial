<ion-content class="login-content">
  <div class="login-container">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">🔐</div>
      <h1 class="brand-title">Verixora</h1>
      <p class="brand-subtitle">Enterprise Smart Access</p>
    </div>

    <!-- Login Form -->
    <div class="login-form">
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <ion-item class="input-item">
          <ion-input
            type="tel"
            placeholder="Enter your phone number"
            [(ngModel)]="phoneNumber"
            name="phone"
            required>
          </ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <ion-item class="input-item">
          <ion-input
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            required>
          </ion-input>
        </ion-item>
      </div>

      <div class="form-group" *ngIf="showOtpInput">
        <label class="form-label">Verification Code</label>
        <ion-item class="input-item otp-input">
          <ion-input
            type="number"
            placeholder="Enter 6-digit OTP"
            [(ngModel)]="otp"
            name="otp"
            maxlength="6">
          </ion-input>
          <div class="otp-timer" *ngIf="otpTimer > 0">
            {{ otpTimer }}s
          </div>
        </ion-item>
      </div>

      <button
        class="btn-primary"
        (click)="sendOtp()"
        [disabled]="!phoneNumber || !password || isLoading">
        {{ showOtpInput ? 'Resend OTP' : 'Send OTP' }}
      </button>

      <button
        class="btn-primary btn-login"
        (click)="login()"
        [disabled]="!phoneNumber || !password || !otp || isLoading"
        *ngIf="showOtpInput">
        Sign In
      </button>

      <div class="register-link">
        Don't have an account? <a (click)="goToRegister()">Contact Support</a>
      </div>

      <div *ngIf="message" class="message" [class.error]="isError">
        {{ message }}
      </div>
    </div>
  </div>
</ion-content>
