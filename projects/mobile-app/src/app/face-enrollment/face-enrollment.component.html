<ion-header class="ion-no-border">
  <ion-toolbar color="transparent">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Face Enrollment</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="enrollment-content" scroll="false">
  <div class="enrollment-container">
    <!-- Scanner UI (while scanning) -->
    @if (!isComplete && !error) {
      <div class="scanner-area">
        <div class="scanner-frame">
          <div class="corner top-left"></div>
          <div class="corner top-right"></div>
          <div class="corner bottom-left"></div>
          <div class="corner bottom-right"></div>
          <div class="face-silhouette">
            <svg viewBox="0 0 100 100" width="80" height="80">
              <circle cx="50" cy="38" r="20" stroke="#4F6AF5" stroke-width="2" fill="none" opacity="0.8" />
              <path d="M 35 62 Q 50 52 65 62" stroke="#4F6AF5" stroke-width="2" fill="none" opacity="0.8" />
            </svg>
          </div>
          <div class="scan-line"></div>
        </div>
        <div class="status-area">
          <span class="status-text">{{ statusMessage }}</span>
          <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="progress"></div>
          </div>
        </div>
      </div>
    }

    <!-- Success State -->
    @if (isComplete) {
      <div class="success-state">
        <div class="success-ring">
          <ion-icon name="checkmark-outline"></ion-icon>
        </div>
        <h2>Face Enrolled</h2>
        <p>Your face has been successfully registered</p>
        <ion-button (click)="goBack()" class="done-btn">Done</ion-button>
      </div>
    }

    <!-- Error State -->
    @if (error) {
      <div class="error-state">
        <ion-icon name="alert-circle-outline" class="error-icon"></ion-icon>
        <h2>Scan Failed</h2>
        <p>{{ error }}</p>
        <ion-button (click)="retry()" class="done-btn">Try Again</ion-button>
      </div>
    }
  </div>
</ion-content>
